<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"

                <div class="input_block">
                    <input id="datepicker_2" placeholder="to" type="text">

<main>
    <div class="list_type">
        <img alt="" src="img/blocks_active.png" id="bloks">
